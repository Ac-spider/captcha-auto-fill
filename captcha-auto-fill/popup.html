<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>验证码自动识别</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>验证码自动识别</h1>
      <span class="version">v1.0.0</span>
    </header>

    <div class="status-section">
      <div class="status-item">
        <span class="status-label">自动识别</span>
        <label class="switch">
          <input type="checkbox" id="toggleSwitch">
          <span class="slider"></span>
        </label>
      </div>
      <div class="status-indicator" id="statusIndicator">
        <span class="dot"></span>
        <span class="text" id="statusText">已启用</span>
      </div>
    </div>

    <div class="divider"></div>

    <div class="result-section" id="resultSection">
      <h2>识别结果</h2>
      <div class="result-display" id="resultDisplay">
        <span class="no-result">暂无识别结果</span>
      </div>
      <div class="confidence-bar">
        <div class="confidence-fill" id="confidenceFill"></div>
      </div>
      <span class="confidence-text" id="confidenceText"></span>
    </div>

    <div class="action-section">
      <button class="btn btn-primary" id="manualRecognizeBtn">
        <span class="icon">🔍</span>
        手动识别
      </button>
    </div>

    <div class="divider"></div>

    <div class="settings-section">
      <h2>账号设置</h2>

      <div class="setting-item">
        <label class="setting-label">jAccount 用户名</label>
        <input type="text" id="jaccountUser" class="setting-input" placeholder="输入 jAccount 用户名">
      </div>

      <div class="setting-item">
        <label class="setting-label">jAccount 密码</label>
        <input type="password" id="jaccountPass" class="setting-input" placeholder="输入 jAccount 密码">
        <p class="setting-hint">密码仅在本地存储，不会上传到任何服务器</p>
      </div>

      <div class="setting-item">
        <label class="checkbox-label">
          <input type="checkbox" id="autoFillCredentialsCheck">
          <span>自动填充用户名和密码</span>
        </label>
      </div>

      <div class="divider"></div>

      <h2>识别设置</h2>

      <div class="setting-item">
        <label class="setting-label">识别引擎</label>
        <select id="engineSelect" class="setting-select">
          <optgroup label="本地服务">
            <option value="local">本地 ddddocr (推荐)</option>
          </optgroup>
          <optgroup label="AI 大模型 (视觉)">
            <option value="kimi">Kimi (Moonshot)</option>
            <option value="openai">OpenAI GPT-4 Vision</option>
            <option value="claude">Claude 3 (Anthropic)</option>
            <option value="gemini">Gemini (Google)</option>
          </optgroup>
          <optgroup label="云 OCR 服务">
            <option value="baidu">百度智能云 OCR</option>
            <option value="aliyun">阿里云 OCR</option>
            <option value="online">ocr.space (免费)</option>
          </optgroup>
        </select>
        <p class="setting-hint" id="engineHint">使用本地 ddddocr 服务，需要启动本地服务器</p>
      </div>

      <!-- 模型选择 (仅 AI 大模型显示) -->
      <div class="setting-item" id="modelSelectSection" style="display: none;">
        <label class="setting-label">选择模型</label>
        <select id="modelSelect" class="setting-select">
          <!-- 动态填充 -->
        </select>
      </div>

      <!-- API Key 输入 -->
      <div class="setting-item" id="apiKeyInputSection" style="display: none;">
        <label class="setting-label" id="apiKeyLabel">API Key</label>
        <input type="password" id="apiKeyInput" class="setting-input" placeholder="输入 API Key">
        <input type="password" id="apiSecretInput" class="setting-input" placeholder="输入 Secret Key" style="margin-top: 8px; display: none;">
        <p class="setting-hint" id="apiKeyHint">
          <a href="#" target="_blank" id="apiKeyLink">获取 API Key</a>
        </p>
      </div>

      <div class="setting-item">
        <label class="checkbox-label">
          <input type="checkbox" id="oneClickLoginCheck">
          <span>一键登录（自动提交，失败自动重试）</span>
        </label>
      </div>

      <div class="setting-item">
        <label class="checkbox-label">
          <input type="checkbox" id="soundCheck" checked>
          <span>识别完成提示音</span>
        </label>
      </div>
    </div>

    <div class="info-section">
      <p class="tip">💡 提示：开启"自动填充用户名密码"和"一键登录"后，打开登录页面即可全自动登录</p>
    </div>

    <footer class="footer">
      <span>支持 jaccount 等常见验证码</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
